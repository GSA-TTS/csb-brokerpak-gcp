---
version: 1
name: csb-google-vertex-ai
id: b2c3d4e5-f6a7-8901-bcde-f01234567801
description: |
  CSB GCP Vertex AI — current access family: google_vertex_identity.
  Brokers a dedicated service account key for Vertex AI inference and a GCS
  artifact bucket. Provision creates a service account with aiplatform.user
  role; bind returns a service account key JSON in VCAP_SERVICES credentials.
  This identity-backed flow remains distinct from the future google_gemini_key
  family, which will expose key-oriented access instead of Vertex IAM grants.
display_name: CSB GCP Vertex AI
image_url: file://service-images/csb.png
documentation_url: https://cloud.google.com/vertex-ai/docs
provider_display_name: GSA TTS
support_url: https://cloud.google.com/vertex-ai/
tags: [gcp, vertex-ai, ai, llm, generative-ai, identity]
plan_updateable: true
plans:
- name: sandbox-8h
  id: f6a7b8c9-d0e1-2345-fabc-345678901301
  description: |
    Sandbox plan — 8-hour TTL with configurable model selection.
    Supports the same `models` override surface as the standard plan; only the
    TTL envelope is sandbox-constrained.
    Auto-deprovisioned by TTL controller after ttl_hours. Optional operator
    budget alert email can be configured broker-side.
    Access family: google_vertex_identity.
  display_name: Sandbox 8-hour
  properties:
    ttl_hours: 8
    region: us-central1
    models: '["gemini-2.0-flash-001","gemini-2.5-flash","gemini-2.5-flash-lite","gemini-2.5-pro","gemini-3.1-flash","gemini-3.1-pro-preview","gemini-3.1-flash-lite-preview","gemini-3-flash-preview","gemini-3-pro-image-preview","claude-sonnet-4-6","claude-opus-4-6","claude-opus-4-5@20251101","claude-haiku-4-5@20251001","claude-sonnet-4-5@20250929"]'
- name: standard
  id: a7b8c9d0-e1f2-3456-abcd-456789012401
  description: |
    Standard plan — configurable TTL with the same model list override surface
    exposed by sandbox-8h.
    Optional operator budget alert email can be configured broker-side.
    Access family: google_vertex_identity.
  display_name: Standard
  properties:
    region: us-central1
    models: '["gemini-2.0-flash-001","gemini-2.5-flash","gemini-2.5-flash-lite","gemini-2.5-pro","gemini-3.1-flash","gemini-3.1-pro-preview","gemini-3.1-flash-lite-preview","gemini-3-flash-preview","gemini-3-pro-image-preview","claude-sonnet-4-6","claude-opus-4-6","claude-opus-4-5@20251101","claude-haiku-4-5@20251001","claude-sonnet-4-5@20250929"]'
provision:
  plan_inputs:
  - field_name: ttl_hours
    type: number
    details: Hours until this instance is auto-deprovisioned (max 8 for sandbox-8h plan).
    default: 8
  - field_name: models
    type: string
    details: |
      JSON array of Vertex AI model IDs available in the region, including Gemini and partner models.
      Supported on both sandbox-8h and standard.
      Example: '["gemini-3.1-pro-preview","claude-sonnet-4-6"]'
    default: '["gemini-2.0-flash-001","gemini-2.5-flash","gemini-2.5-flash-lite","gemini-2.5-pro","gemini-3.1-flash","gemini-3.1-pro-preview","gemini-3.1-flash-lite-preview","gemini-3-flash-preview","gemini-3-pro-image-preview","claude-sonnet-4-6","claude-opus-4-6","claude-opus-4-5@20251101","claude-haiku-4-5@20251001","claude-sonnet-4-5@20250929"]'
  - field_name: budget_amount
    type: number
    details: Monthly USD budget threshold metadata for this instance. Alerting is operator-email based when configured broker-side.
    default: 100
  user_inputs:
  - field_name: instance_name
    type: string
    details: Name prefix for created GCP resources (service account, bucket, endpoint).
    default: csb-${request.instance_id}
    prohibit_update: true
  - field_name: region
    type: string
    details: GCP region for Vertex AI endpoint and GCS bucket.
    default: us-central1
    constraints:
      examples:
      - us-central1
      - us-east4
      pattern: ^[a-z][a-z0-9-]+$
    prohibit_update: true
  - field_name: project
    type: string
    details: GCP project ID. Defaults to the project set in gcp.project env var.
    default: ""
  computed_inputs:
  - name: labels
    default: ${json.marshal(request.default_labels)}
    overwrite: true
    type: object
  - name: cf_context_json
    default: ${json.marshal(request.context)}
    overwrite: true
    type: string
  - name: cf_originating_identity_json
    default: ${json.marshal(request.x_broker_api_originating_identity)}
    overwrite: true
    type: string
  - name: credentials
    default: ${config("gcp.credentials")}
    overwrite: true
    type: string
  - name: project
    default: ${config("gcp.project")}
    overwrite: true
    type: string
  - name: budget_alert_email
    default: ${config("gcp.budget_alert_email")}
    overwrite: true
    type: string
  template_refs:
    data: terraform/vertex-ai/provision/data.tf
    main: terraform/vertex-ai/provision/main.tf
    outputs: terraform/vertex-ai/provision/outputs.tf
    provider: terraform/vertex-ai/provision/provider.tf
    versions: terraform/vertex-ai/provision/versions.tf
    variables: terraform/vertex-ai/provision/variables.tf
  outputs:
  - field_name: instance_name
    type: string
    details: Requested instance name used as the naming prefix for provisioned resources.
  - field_name: cf_provenance_json
    type: string
    details: JSON object of the Cloud Foundry org, space, and user provenance applied to resource labels.
  - field_name: resource_labels_json
    type: string
    details: JSON object of the effective GCP labels applied to the provisioned resources.
  - field_name: project_id
    type: string
    details: GCP project ID.
  - field_name: region
    type: string
    details: GCP region.
  - field_name: service_account_email
    type: string
    details: Service account email for Vertex AI.
  - field_name: service_account_id
    type: string
    details: Fully-qualified service account resource ID.
  - field_name: bucket_name
    type: string
    details: GCS bucket for ML artifacts.
  - field_name: api_endpoint
    type: string
    details: Regional Vertex AI API endpoint.
  - field_name: available_models
    type: string
    details: JSON array of available model IDs.
  - field_name: budget_amount
    type: number
    details: Monthly USD budget threshold metadata for this instance.
  - field_name: budget_enforcement_mode
    type: string
    details: Whether an optional operator budget alert email is configured broker-side.
  - field_name: ttl_expires_at
    type: string
    details: RFC3339 timestamp when this instance expires.
bind:
  plan_inputs: []
  user_inputs: []
  computed_inputs:
  - name: project_id
    default: ${instance.details["project_id"]}
    overwrite: true
    type: string
  - name: instance_name
    default: ${instance.details["instance_name"]}
    overwrite: true
    type: string
  - name: resource_labels_json
    default: ${instance.details["resource_labels_json"]}
    overwrite: true
    type: string
  - name: cf_context_json
    default: ${json.marshal(request.context)}
    overwrite: true
    type: string
  - name: cf_originating_identity_json
    default: ${json.marshal(request.x_broker_api_originating_identity)}
    overwrite: true
    type: string
  - name: cf_app_guid
    default: ${request.app_guid}
    overwrite: true
    type: string
  - name: region
    default: ${instance.details["region"]}
    overwrite: true
    type: string
  - name: service_account_id
    default: ${instance.details["service_account_id"]}
    overwrite: true
    type: string
  - name: bucket_name
    default: ${instance.details["bucket_name"]}
    overwrite: true
    type: string
  - name: api_endpoint
    default: ${instance.details["api_endpoint"]}
    overwrite: true
    type: string
  - name: available_models
    default: ${instance.details["available_models"]}
    overwrite: true
    type: string
  - name: budget_enforcement_mode
    default: ${instance.details["budget_enforcement_mode"]}
    overwrite: true
    type: string
  - name: ttl_expires_at
    default: ${instance.details["ttl_expires_at"]}
    overwrite: true
    type: string
  - name: credentials
    default: ${config("gcp.credentials")}
    overwrite: true
    type: string
  template_refs:
    main: terraform/vertex-ai/bind/main.tf
    outputs: terraform/vertex-ai/bind/outputs.tf
    provider: terraform/vertex-ai/bind/provider.tf
    versions: terraform/vertex-ai/bind/versions.tf
    variables: terraform/vertex-ai/bind/variables.tf
  outputs:
  - field_name: credentials_json
    type: string
    details: Service account key JSON for authenticating to Vertex AI.
  - field_name: instance_name
    type: string
    details: Requested instance name used as the naming prefix for provisioned resources.
  - field_name: binding_provenance_json
    type: string
    details: JSON object of the Cloud Foundry org, space, user, and bound app provenance for this binding.
  - field_name: resource_labels_json
    type: string
    details: JSON object of the effective GCP labels applied to the provisioned resources.
  - field_name: project_id
    type: string
    details: GCP project ID.
  - field_name: region
    type: string
    details: GCP region.
  - field_name: api_endpoint
    type: string
    details: Regional Vertex AI API endpoint.
  - field_name: models
    type: string
    details: JSON array of available model IDs.
  - field_name: bucket_name
    type: string
    details: GCS artifact bucket name.
  - field_name: budget_enforcement_mode
    type: string
    details: Whether an optional operator budget alert email is configured broker-side.
  - field_name: ttl_expires_at
    type: string
    details: RFC3339 timestamp when this instance expires.
  - field_name: normalized_binding_json
    type: string
    details: Normalized v1 runtime binding payload for cross-provider consumers.
